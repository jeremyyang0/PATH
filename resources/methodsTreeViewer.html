<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods Tree Viewer</title>
    <style>
        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--vscode-foreground);
            background-color: var(--vscode-editor-background);
            margin: 0;
            padding: 8px;
        }
        
        .search-container {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        .search-input {
            flex: 1;
            background-color: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 3px;
            padding: 6px 8px;
            font-size: 13px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--vscode-focusBorder);
        }
        
        .search-button, .clear-button {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 3px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .search-button:hover, .clear-button:hover {
            background-color: var(--vscode-button-hoverBackground);
        }
        
        .clear-button {
            background-color: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }
        
        .toolbar {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .toolbar-button {
            background-color: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
            border: none;
            border-radius: 3px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .toolbar-button:hover {
            background-color: var(--vscode-button-secondaryHoverBackground);
        }
        
        .tree-container {
            border: 1px solid var(--vscode-panel-border);
            border-radius: 3px;
            background-color: var(--vscode-list-activeSelectionBackground);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }
        
        .tree-item {
            display: flex;
            align-items: center;
            padding: 3px 8px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--vscode-panel-border);
        }
        
        .tree-item:hover {
            background-color: var(--vscode-list-hoverBackground);
        }
        
        .tree-item.selected {
            background-color: var(--vscode-list-activeSelectionBackground);
            color: var(--vscode-list-activeSelectionForeground);
        }
        
        .tree-item.leaf {
            color: var(--vscode-symbolIcon-methodForeground);
        }
        
        .tree-item.folder {
            color: var(--vscode-symbolIcon-folderForeground);
            font-weight: 500;
        }
        
        .indent {
            display: inline-block;
            width: 16px;
        }
        
        .expand-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            cursor: pointer;
            text-align: center;
            line-height: 16px;
            font-size: 12px;
        }
        
        .expand-icon.expandable:before {
            content: "▶";
        }
        
        .expand-icon.expanded:before {
            content: "▼";
        }
        
        .expand-icon.leaf:before {
            content: "⚬";
            color: var(--vscode-symbolIcon-methodForeground);
        }
        
        .tree-label {
            flex: 1;
            padding-left: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .tree-actions {
            display: none;
            gap: 4px;
        }
        
        .tree-item:hover .tree-actions {
            display: flex;
        }
        
        .action-button {
            background: none;
            border: none;
            color: var(--vscode-icon-foreground);
            cursor: pointer;
            padding: 2px;
            border-radius: 2px;
            font-size: 12px;
        }
        
        .action-button:hover {
            background-color: var(--vscode-toolbar-hoverBackground);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--vscode-descriptionForeground);
        }
        
        .no-results {
            text-align: center;
            padding: 20px;
            color: var(--vscode-descriptionForeground);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索方法（支持中文描述或方法名）">
        <button class="search-button" onclick="performSearch()">搜索</button>
        <button class="clear-button" onclick="clearSearch()">清除</button>
    </div>
    
    <div class="toolbar">
        <button class="toolbar-button" onclick="refreshData()">🔄 刷新</button>
        <button class="toolbar-button" onclick="expandAll()">📂 展开全部</button>
        <button class="toolbar-button" onclick="collapseAll()">📁 收起全部</button>
    </div>
    
    <div class="tree-container" id="treeContainer">
        <div class="loading">正在加载数据...</div>
    </div>
    
    <script src="methodsTreeViewer.js"></script>
</body>
</html>
