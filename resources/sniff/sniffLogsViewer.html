<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniff Logs</title>
    <style>
        :root {
            --bg: var(--vscode-panel-background);
            --surface: color-mix(in srgb, var(--vscode-editor-background) 96%, transparent);
            --surface-strong: color-mix(in srgb, var(--vscode-editorWidget-background) 88%, transparent);
            --border: color-mix(in srgb, var(--vscode-panel-border) 78%, transparent);
            --muted: var(--vscode-descriptionForeground);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 6px 8px 8px;
            height: 100vh;
            font: 12px/1.4 "Segoe UI", "Microsoft YaHei", sans-serif;
            color: var(--vscode-foreground);
            background: var(--bg);
            overflow: hidden;
        }

        .pane {
            height: 100%;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            overflow: hidden;
        }

        .pane-header {
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            background: var(--surface-strong);
            font-weight: 700;
        }

        .pane-body {
            min-height: 0;
            flex: 1;
            overflow: auto;
        }

        .empty,
        .log-box {
            margin: 0;
            padding: 8px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty {
            color: var(--muted);
        }

        .log-box {
            font: 11px/1.45 Consolas, "Courier New", monospace;
        }
    </style>
</head>
<body>
    <section class="pane">
        <div class="pane-header">连接日志</div>
        <div id="logContainer" class="pane-body"></div>
    </section>

    <script src="sniffLogsViewer.js"></script>
</body>
</html>
